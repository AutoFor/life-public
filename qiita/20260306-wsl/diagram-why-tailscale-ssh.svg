<svg xmlns="http://www.w3.org/2000/svg" width="680" height="420" viewBox="0 0 680 420" font-family="sans-serif">

  <!-- 外出先エリア -->
  <rect x="20" y="20" width="240" height="370" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="140" y="48" text-anchor="middle" font-size="14" font-weight="bold" fill="#23527c">外出先</text>

  <!-- 外出先PC -->
  <rect x="60" y="65" width="160" height="52" rx="6" fill="#fff" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="140" y="87" text-anchor="middle" font-size="11" fill="#333">外出先のPC</text>
  <text x="140" y="104" text-anchor="middle" font-size="10" fill="#666">（Windows / Mac）</text>

  <!-- ローカルWSL NG -->
  <rect x="60" y="150" width="160" height="52" rx="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="140" y="170" text-anchor="middle" font-size="11" fill="#b85450">❌ ローカル WSL</text>
  <text x="140" y="188" text-anchor="middle" font-size="10" fill="#b85450">環境の差分が出てしまう</text>

  <!-- クラウドVM NG -->
  <rect x="60" y="230" width="160" height="52" rx="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="140" y="250" text-anchor="middle" font-size="11" fill="#b85450">❌ クラウド VM</text>
  <text x="140" y="268" text-anchor="middle" font-size="10" fill="#b85450">月2〜3千円 / 管理コスト</text>

  <!-- SSH OK -->
  <rect x="60" y="315" width="160" height="40" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="140" y="340" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d6a4f">✅ SSH（Tailscale経由）</text>

  <!-- 矢印: PC → ローカルWSL -->
  <line x1="140" y1="117" x2="140" y2="148" stroke="#b85450" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>

  <!-- 矢印: PC → クラウドVM -->
  <path d="M 110 117 Q 100 140 100 148" stroke="#b85450" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowRed)"/>
  <path d="M 110 117 L 100 148" stroke="none"/>
  <line x1="110" y1="117" x2="100" y2="148" stroke="#b85450" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>

  <!-- 矢印: PC → SSH -->
  <line x1="170" y1="117" x2="190" y2="313" stroke="#82b366" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Tailscale VPN ゾーン -->
  <rect x="280" y="160" width="120" height="50" rx="20" fill="#e8f4fd" stroke="#6c8ebf" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="340" y="181" text-anchor="middle" font-size="10" font-weight="bold" fill="#23527c">Tailscale</text>
  <text x="340" y="197" text-anchor="middle" font-size="10" fill="#23527c">VPN</text>

  <!-- SSH矢印（エリアをまたぐ） -->
  <path d="M 220 335 L 420 335 L 420 185" stroke="#82b366" stroke-width="2.5" fill="none" stroke-dasharray="none" marker-end="url(#arrowGreenBig)"/>
  <text x="320" y="355" text-anchor="middle" font-size="10" fill="#2d6a4f" font-weight="bold">キー入力のみ送受信</text>

  <!-- 自宅エリア -->
  <rect x="420" y="20" width="240" height="370" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="540" y="48" text-anchor="middle" font-size="14" font-weight="bold" fill="#2d6a4f">自宅</text>

  <!-- 自宅PC -->
  <rect x="460" y="65" width="160" height="65" rx="6" fill="#fff" stroke="#82b366" stroke-width="1.5"/>
  <text x="540" y="87" text-anchor="middle" font-size="11" fill="#333">自宅PC（Windows）</text>
  <text x="540" y="104" text-anchor="middle" font-size="10" fill="#666">OpenSSH サーバ起動中</text>
  <text x="540" y="120" text-anchor="middle" font-size="10" fill="#666">Tailscale インストール済</text>

  <!-- WSL -->
  <rect x="460" y="165" width="160" height="60" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="540" y="188" text-anchor="middle" font-size="11" fill="#2d6a4f">WSL（Ubuntu）</text>
  <text x="540" y="207" text-anchor="middle" font-size="10" fill="#2d6a4f">カスタマイズ済み環境</text>

  <!-- Claude -->
  <rect x="460" y="260" width="160" height="65" rx="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="540" y="283" text-anchor="middle" font-size="11" fill="#7d5a00">Claude Code / Codex</text>
  <text x="540" y="300" text-anchor="middle" font-size="10" fill="#7d5a00">ローカルで処理完結</text>
  <text x="540" y="317" text-anchor="middle" font-size="10" fill="#7d5a00">距離の影響なし</text>

  <!-- 自宅内矢印 -->
  <line x1="540" y1="130" x2="540" y2="163" stroke="#82b366" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="540" y1="225" x2="540" y2="258" stroke="#d6b656" stroke-width="1.5" marker-end="url(#arrowYellow)"/>

  <!-- 矢印定義 -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#b85450"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#82b366"/>
    </marker>
    <marker id="arrowGreenBig" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#82b366"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d6b656"/>
    </marker>
  </defs>

</svg>
